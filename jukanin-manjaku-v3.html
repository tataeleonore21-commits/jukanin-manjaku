<title>Jukanin Manjaku</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#f0c040;--gold2:#e8923a;--gold3:#c8892a;--gold4:#8a5a1a;
  --bg:#0a0d12;--bg2:#111520;--bg3:#181e2a;
  --text:#f0e8d8;--muted:rgba(240,232,216,0.45);--dim:rgba(240,232,216,0.18);
  --card:rgba(255,255,255,0.035);--border:rgba(200,137,42,0.22);
  --radius:14px;--rad-sm:9px;
}
html,body{height:100%;background:var(--bg);font-family:'Crimson Pro',Georgia,serif;color:var(--text)}

/* ─── GRAIN OVERLAY ─── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.6}

#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}

/* ─── HEADER ─── */
#hd{
  padding:18px 20px 14px;
  flex-shrink:0;
  background:linear-gradient(180deg,rgba(10,8,3,0.95) 0%,rgba(10,13,18,0) 100%);
  position:relative;z-index:10;
}
#hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent)}
.hd-inner{display:flex;align-items:center;justify-content:space-between}
#hd h1{
  font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 60%,#b8602a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hd-sub{font-size:10px;color:var(--gold3);letter-spacing:3px;text-transform:uppercase;margin-top:1px;font-style:italic}
.hd-badge{background:rgba(200,137,42,0.15);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--gold);font-family:'Cinzel',serif}

/* ─── SCROLL AREA ─── */
#ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 96px;scroll-behavior:smooth}
#ct::-webkit-scrollbar{width:2px}
#ct::-webkit-scrollbar-track{background:transparent}
#ct::-webkit-scrollbar-thumb{background:var(--gold4);border-radius:2px}

/* ─── BOTTOM NAV ─── */
#nv{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(8,10,14,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
  padding:6px 8px 10px;
  gap:4px;
}
.nb{
  flex:1;padding:8px 2px 6px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-family:'Crimson Pro',serif;font-size:9px;
  border-radius:12px;transition:all .25s ease;position:relative;
}
.nb.on{color:var(--bg);background:linear-gradient(135deg,var(--gold),var(--gold2))}
.nb:not(.on):active{background:rgba(200,137,42,0.1)}
.ni-wrap{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:all .25s ease;
}
.nb.on .ni-wrap{background:transparent}
.nb:not(.on) .ni-wrap{background:rgba(255,255,255,0.04)}
.nb-lbl{font-size:9px;font-weight:600;letter-spacing:.5px;transition:all .25s ease}

/* ─── PAGE ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.anim-up{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.anim-in{animation:fadeIn .3s ease both}

/* ─── HERO BANNER (Accueil) ─── */
.hero{
  background:linear-gradient(135deg,rgba(200,137,42,0.22) 0%,rgba(232,146,58,0.08) 50%,rgba(200,137,42,0.05) 100%);
  border:1px solid var(--border);border-radius:18px;padding:20px 18px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(240,192,64,0.2) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.hero::after{
  content:'✦';position:absolute;top:14px;right:18px;font-size:28px;
  color:rgba(240,192,64,0.2);
}
.hero-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
.hero-text{font-size:13px;line-height:1.75;color:rgba(240,232,216,0.75)}

/* ─── STATS STRIP ─── */
.stats{display:flex;gap:8px;margin-bottom:20px}
.stat{
  flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 8px;text-align:center;position:relative;overflow:hidden;
  transition:transform .2s ease;
}
.stat:active{transform:scale(.96)}
.stat::before{
  content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(240,192,64,0.06),transparent);
  animation:shimmer 3s ease infinite;
}
.stat-v{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold)}
.stat-l{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:1px;text-transform:uppercase}

/* ─── SECTION LABELS ─── */
.sec-label{
  font-size:9px;letter-spacing:4px;color:var(--gold3);text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sec-label::before,.sec-label::after{content:'';flex:1 1 20px;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sec-label::before{background:linear-gradient(90deg,transparent,var(--border))}

/* ─── LEÇON CARDS (Liste) ─── */
.lc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:4px}
.lc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 12px;cursor:pointer;position:relative;overflow:hidden;
  transition:all .25s cubic-bezier(.22,1,.36,1);
  animation:scaleIn .35s cubic-bezier(.22,1,.36,1) both;
}
.lc:active{transform:scale(.95);background:rgba(200,137,42,0.1)}
.lc-emoji{font-size:26px;margin-bottom:8px;display:block}
.lc-name{font-size:12px;font-weight:600;line-height:1.3;color:var(--text)}
.lc-count{font-size:10px;color:var(--muted);margin-top:4px}
.lc-accent{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--c,var(--gold3)),transparent);
}
.lc-arr{position:absolute;top:10px;right:10px;font-size:11px;color:var(--border)}
.lc:nth-child(1){animation-delay:.05s}
.lc:nth-child(2){animation-delay:.1s}
.lc:nth-child(3){animation-delay:.15s}
.lc:nth-child(4){animation-delay:.2s}
.lc:nth-child(5){animation-delay:.25s}
.lc:nth-child(6){animation-delay:.3s}

}

  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;

}

ë pënan = enlever). -ani = action depuis quelque chose (Pë pënani = retirer de). -and = partir avec (Pë yaand = emmener). -andi = remporter/obtenir (Pë pënandi = remporter)."}, {"t": "L'impératif", "c": "L'impératif se forme en ajoutant -an à la fin du verbe. Tu = verbe+an (Yaan, Rielan). Qu'il/elle = Na + verbe (Na ya). Nous = Ngë + verbe (Ngë ya). Vous = Nda + verbe+an (Nda yaan)."}, {"t": "Le complément d'objet", "c": "En manjaku le complément se place directement après le verbe. Ex: Man lip u (Je t'attends), Kë lip in (Tu m'attends). Pronoms compléments: in = me/moi, u = te/toi, ul = le/la/lui, ind = vous, wënd = nous, bukul = les/leur."}, {"t": "Deux groupes de verbes", "c": "Groupe 1 (M', A, Wënda): ci, yës, lilan, me, te, ñgaal… Groupe 2 (Kë, Ka, Wënd ka, Ndu, Buka): ya, ja, juk, ro, lok, jaka… Man (je) est identique dans les deux groupes !"}, {"t": "L'adjectif après le nom", "c": "En manjak, l'adjectif se place toujours après le nom. Ex: Kato kawar (belle maison), Uncam mak (beaucoup d'argent)."}, {"t": "Deux 'nous'", "c": "Wënd/Wënda = nous sans la personne à qui on parle (exclusif). Inja/Ngë = nous avec la personne à qui on parle (inclusif)."}, {"t": "La possession", "c": "Inji = mon/ma — U = ton/ta — Ul = son/sa. Ex: Anin inji (ma mère), Atiem ul nints (son grand-père)."}, {"t": "Ka reen — exprimer la douleur", "c": "[partie du corps / besoin] + ka reen exprime la douleur. Ex: Been ka reen (j'ai mal à la tête), U bon ka reen (j'ai faim)."}, {"t": "Les classes nominales", "c": "Singulier: Ka, U, Pë, Bë, Na. Pluriel: I, Ngë. Ex: Ka misa → I misa, U roba → Ngë roba."}, {"t": "Le futur proche", "c": "Man ya pë [verbe] = je vais faire qqch. Ex: Man ya pë ño (je vais me doucher). Ya + lieu: Man ya kato (je vais à la maison)."}, {"t": "Riela = Diela — R et D interchangeables", "c": "Le R et le D sont interchangeables en manjaku. Ex: Pë riela = Pë diela (manger). Les deux formes sont correctes."}, {"t": "La négation — Dika", "c": "Dika est le marqueur de la négation. Il se place après le sujet. Ex: Man dika ya (Je ne vais pas), Ka dika me (Il/Elle ne sait pas)."}, {"t": "Prépositions et connecteurs", "c": "Avec = Ni | Avant = Di brun | Après = Tsi brun | Devant = Di brun | Derrière = Di ufets | À côté = Di kanban | Dedans = Di bametsu | Dehors = Di utsand | Dessus = Di ruëts | Dessous = Di utsia | Mais = Ma | Toujours = Maa | Tête nue = Been bë jënts | À la fin = U ba"}, {"t": "Les classificateurs numéraux", "c": "En manjaku, le classificateur (1, 2...) suit la classe nominale du mot. La classe est indiquée par le préfixe du nom. Exemples : Pë mangu → Pëlon pë mangu (1 mangue) / Ngëlon ngë mangu (des mangues). Ka mañ → Kalon ka mañ (1 sac) / Ilon i mañ (des sacs). U bus → Ulon u bus (1 chien) / Ngëlon ngë bus (des chiens). Na cunkan → Nalon na cunkan (1 soignant) / Balon ba cunkan (des soignants). La règle : le classificateur reprend le préfixe singulier du nom."}], "ESSENTIELS": [{"fr": "Oui", "mj": "Eyo"}, {"fr": "Non", "mj": "Naw"}, {"fr": "Bravo !", "mj": "Ina !"}, {"fr": "Merci", "mj": "Baran"}, {"fr": "Bien", "mj": "Uwar"}, {"fr": "Un peu", "mj": "Kotiës"}, {"fr": "Beaucoup", "mj": "Mak"}, {"fr": "J'ai bien dormi", "mj": "Man ñgoy uwar"}, {"fr": "Je me suis bien levé", "mj": "Man natsa uwar"}, {"fr": "Je vais me doucher", "mj": "Man ya pë ño"}, {"fr": "Je vais à la maison", "mj": "Man ya kato"}, {"fr": "Je vais faire pipi", "mj": "Man ya katuan"}], "INTERROGATIFS": [{"fr": "Où ?", "mj": "Tsùm"}, {"fr": "Quoi ?", "mj": "We"}, {"fr": "Comment ? / Quel ?", "mj": "Um"}, {"fr": "Qui ?", "mj": "Yën"}, {"fr": "Quand ?", "mj": "Lum"}, {"fr": "Pourquoi ?", "mj": "Ni we"}, {"fr": "Combien ?", "mj": "Um"}], "VOYELLES": [{"l": "A", "s": "Comme en français"}, {"l": "à", "s": "Voyelle tendue"}, {"l": "aa", "s": "Voyelle longue"}, {"l": "E", "s": "Se prononce é"}, {"l": "ë", "s": "Se prononce eu (peur)"}, {"l": "ee", "s": "Voyelle longue"}, {"l": "I", "s": "Comme en français"}, {"l": "O", "s": "Comme en français"}, {"l": "oo", "s":   r+='<p>'+l.mots.filter(function(m){return m.fr.indexOf('---')!==0;}).length+' mots et expressions</p>';
  r+='</div>';
  r+='<div style="background:rgba(200,137,42,0.1);border:1px solid rgba(200,137,42,0.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px"><span style="font-size:16px">👆</span><span style="font-size:12px;color:rgba(240,232,216,0.75)">Appuie sur chaque carte pour voir la réponse</span></div>';
  for(var i=0;i<l.mots.length;i++){
    var m=l.mots[i];
    if(m.fr.indexOf('---')===0){r+='<div class="sep-lbl">'+esc(m.fr.replace(/---/g,'').trim())+'</div>';continue;}
    var f=flipped[i];
    r+='<div class="mc'+(f?' open':'')+'" onclick="FC('+i+')" style="animation-delay:'+(i*0.03)+'s">';
    r+='<div class="mc-row">';
    r+='<div><div class="mc-fr-lbl">Français</div><div class="mc-fr">'+esc(m.fr)+'</div></div>';
    r+='<div><div class="mc-mj-lbl">Manjaku</div><div class="mc-mj">'+esc(m.mj)+'</div></div>';
    r+='</div>';
    if(f&&m.reponse)r+='<div class="mc-extra"><div class="mc-extra-lbl">Réponse</div><div class="mc-extra-val">'+esc(m.reponse)+'</div></div>';
    if(f&&m.exemple)r+='<div class="mc-extra"><div class="mc-extra-lbl">Exemple</div><div class="mc-extra-val">'+esc(m.exemple)+'</div></div>';
    r+='</div>';
  }
  r+='<button class="test-btn" onclick="SQ('+li+')">🎯 Tester cette leçon</button>';
  r+='</div>';
  return r;
}
function FC(i){flipped[i]=!flipped[i];draw();}

// ── GRAMMAIRE ──
function pageG(){
  var secs=[
    {id:'rg',lb:'📜 Règles de grammaire'},
    {id:'pp',lb:'👥 Pronoms personnels'},
    {id:'po',lb:'🔑 Pronoms possessifs'},
    {id:'pi',lb:'❓ Mots interrogatifs'},
    {id:'vb',lb:'⚡ Verbes conjugués'},
    {id:'al',lb:'🔤 Alphabet & sons'},
    {id:'es',lb:'⭐ Mots essentiels'}
  ];
  var r='<h2 class="page-title">Grammaire</h2>';
  for(var i=0;i<secs.length;i++){
    var s=secs[i];var isOpen=(sec===s.id);
    r+='<div class="sg'+(isOpen?' op':'')+'" onclick="TS(\''+s.id+'\')" style="animation-delay:'+(i*0.05)+'s">';
    r+='<span class="sg-title">'+s.lb+'</span>';
    r+='<span class="sg-icon">▼</span>';
    r+='</div>';
    if(isOpen)r+='<div class="sg-content">'+RS(s.id)+'</div>';
  }
  return r;
}
function TS(id){sec=(sec===id)?null:id;verbe=null;draw();}
function RS(id){
  var r='';
  if(id==='rg'){
    for(var i=0;i<REGLES.length;i++){
      var rg=REGLES[i];
      r+='<div class="rc"><div class="rc-title">'+esc(rg.t)+'</div><div class="rc-text">'+esc(rg.c)+'</div></div>';
    }
  }
  else if(id==='pp'){
    r='<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:6px">';
    for(var i=0;i<PRONOMS.length;i++){
      var p=PRONOMS[i];
      r+='<div class="prn-row"><div class="prn-fort">'+esc(p.fort)+'</div><div class="prn-suj">'+esc(p.sujet)+'</div><div class="prn-fr">'+esc(p.fr)+'</div></div>';
    }
    r+='</div>';
  }
  else if(id==='po'){
    var tbls=[
      {t:'Objets (Ka/I)',rows:[{fr:'Mien',sg:'Ka miñ',pl:'I miñ'},{fr:'Tien',sg:'Kic u',pl:'Ic u'},{fr:'Sien',sg:'Kic ul',pl:'Ic ul'},{fr:'Notre',sg:'Kic wend',pl:'Ic wend'},{fr:'Votre',sg:'Kic ind',pl:'Ic ind'},{fr:'Leur',sg:'Kic bukul',pl:'Ic bukul'}]},
      {t:'Personnes (Na/Ba)',rows:[{fr:'Mien',sg:'Na miñ',pl:'Ba miñ'},{fr:'Tien',sg:'Nic u',pl:'Ba ic u'},{fr:'Sien',sg:'Nic ul',pl:'Ba ic ul'}]}
    ];
    for(var ti=0;ti<tbls.length;ti++){
      var tbl=tbls[ti];
      r+='<div class="poss-table"><div class="poss-title">'+tbl.t+'</div><table><thead><tr><th></th><th>Singulier</th><th>Pluriel</th></tr></thead><tbody>';
      for(var j=0;j<tbl.rows.length;j++){
        var row=tbl.rows[j];
        r+='<tr><td style="color:var(--muted)">'+row.fr+'</td><td style="color:var(--gold);font-weight:700">'+row.sg+'</td><td style="color:rgba(240,192,64,0.65)">'+row.pl+'</td></tr>';
      }
      r+='</tbody></table></div>';
    }
  }
  else if(id==='pi'){
    r='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
    for(var i=0;i<INTERROGATIFS.length;i++){
      var m=INTERROGATIFS[i];
      r+='<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">'+esc(m.fr)+'</div><div style="font-size:15px;font-weight:700;color:var(--gold)">'+esc(m.mj)+'</div></div>';
    }
    r+='</div>';
  }
  else if(id==='vb'){
    if(verbe){
      r='<button class="back-btn" onclick="verbe=null;draw()" style="margin-bottom:12px">← Retour</button>';
      r+='<div style="text-align:center;background:linear-gradient(135deg,rgba(200,137,42,0.15),rgba(200,137,42,0.04));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px">';
      r+='<div style="font-size:30px;margin-bottom:6px">'+esc(verbe.e)+'</div>';
      r+='<div style="font-family:Cinzel,serif;font-size:15px;color:var(--gold);font-weight:700">'+esc(verbe.inf)+'</div>';
      r+='<div style="font-size:12px;color:var(--muted);margin-top:3px">'+esc(verbe.fr)+'</div>';
      r+='</div>';
      r+='<div class="verb-detail-grid">';
      for(var i=0;i<verbe.c.length;i++){
        var cv=verbe.c[i];
        r+='<div class="verb-row" style="animation-delay:'+(i*0.05)+'s"><span class="verb-fr-small">'+esc(cv.fr)+'</span><span class="verb-mj-val">'+esc(cv.mj)+'</span></div>';
      }
      r+='</div>';
    }else{
      for(var i=0;i<VERBES.length;i++){
        var v=VERBES[i];
        r+='<div class="verb-list-item" onclick="OV('+i+')" style="animation-delay:'+(i*0.03)+'s">';
        r+='<span class="verb-emoji">'+esc(v.e)+'</span>';
        r+='<div class="verb-info"><div class="verb-mj">'+esc(v.inf)+'</div><div class="verb-fr">'+esc(v.fr)+'</div></div>';
        r+='<span style="color:var(--border);font-size:13px">›</span>';
        r+='</div>';
      }
    }
  }
  else if(id==='al'){
    r='<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--gold3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Voyelles spéciales</div>';
    r+='<div class="alpha-grid">';
    for(var i=0;i<VOYELLES.length;i++){
      var v=VOYELLES[i];
      r+='<div class="alpha-cell"><div class="alpha-letter">'+esc(v.l)+'</div><div class="alpha-sound">'+esc(v.s)+'</div></div>';
    }
    r+='</div></div>';
    r+='<div style="font-size:10px;color:var(--gold3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Consonnes spéciales</div>';
    r+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">';
    for(var i=0;i<CONSONNES.length;i++){
      var cv=CONSONNES[i];
      r+='<div style="background:rgba(200,137,42,0.12);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center">';
      r+='<div style="font-size:18px;font-weight:700;color:var(--gold);font-family:Cinzel,serif">'+esc(cv.l)+'</div>';
      r+='<div style="font-size:9px;color:var(--muted);margin-top:4px;line-height:1.3">'+esc(cv.s)+'</div>';
      r+='</div>';
    }
    r+='</div>';
  }
  else if(id==='es'){
    for(var i=0;i<ESSENTIELS.length;i++){
      var m=ESSENTIELS[i];
      r+='<div class="ess-item"><span class="ess-fr">'+esc(m.fr)+'</span><span class="ess-mj">'+esc(m.mj)+'</span></div>';
    }
  }
  return r;
}
function OV(i){verbe=VERBES[i];draw();}

// ── QUIZ ──
function genO(m,ms){
  if(ms.length<4)return ms;
  var a=ms.filter(function(x){return x.mj!==m.mj;}).sort(function(){return Math.random()-0.5;}).slice(0,3);
  return a.concat([m]).sort(function(){return Math.random()-0.5;});
}
function SQ(i){
  var l=LECONS[i];
  var mots=l.mots.filter(function(m){return m.fr&&m.mj&&m.fr.indexOf('---')!==0;});
  var shuffled=mots.slice().sort(function(){return Math.random()-0.5;}).slice(0,10);
  quiz={on:true,l:{id:l.id,titre:l.titre,mots:shuffled},i:0,sc:0,rep:null,fin:false,opts:genO(shuffled[0],shuffled)};
  go('q');
}
function pageQ(){
  if(!quiz.on&&!quiz.fin){
    var r='<h2 class="page-title">Quiz</h2>';
    r+='<p style="font-size:12px;color:var(--muted);margin-bottom:16px">Choisissez une leçon pour vous tester</p>';
    for(var i=0;i<LECONS.length;i++){
      var l=LECONS[i];
      r+='<div class="quiz-list-item" onclick="SQ('+i+')" style="animation-delay:'+(i*0.04)+'s">';
      r+='<span style="font-size:22px">'+esc(l.emoji)+'</span>';
      r+='<div style="flex:1"><div style="font-weight:600;font-size:13px">'+esc(l.titre)+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px">'+l.mots.filter(function(m){return m.fr.indexOf('---')!==0;}).length+' questions</div></div>';
      r+='<span style="color:var(--gold);font-size:13px">›</span>';
      r+='</div>';
    }
    return r;
  }
  if(quiz.fin){
    var e=quiz.sc===quiz.l.mots.length?'🏆':quiz.sc>=quiz.l.mots.length/2?'⭐':'💪';
    return '<div class="quiz-fin">'+
      '<span class="quiz-fin-trophy">'+e+'</span>'+
      '<div class="quiz-fin-score">'+quiz.sc+' / '+quiz.l.mots.length+'</div>'+
      '<div class="quiz-fin-msg">'+(quiz.sc===quiz.l.mots.length?'Parfait, bravo !':quiz.sc>=quiz.l.mots.length/2?'Bien joué !':'Continue, tu progresses !')+'</div>'+
      '<button class="test-btn" style="max-width:220px;margin:0 auto;display:block" onclick="quiz={on:false,l:null,i:0,sc:0,rep:null,fin:false,opts:[]};draw()">Recommencer</button>'+
      '</div>';
  }
  var m=quiz.l.mots[quiz.i];
  var r='<div class="quiz-wrap">';
  r+='<div class="quiz-top"><button class="quiz-close" onclick="quiz={on:false,l:null,i:0,sc:0,rep:null,fin:false,opts:[]};draw()">✕</button><div class="quiz-num">'+(quiz.i+1)+' / '+quiz.l.mots.length+'</div><div class="quiz-score">⭐ '+quiz.sc+'</div></div>';
  r+='<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+Math.round(quiz.i/quiz.l.mots.length*100)+'%"></div></div>';
  r+='<div class="quiz-q"><div class="quiz-q-lbl">Comment dit-on en Manjaku ?</div><div class="quiz-q-word">'+esc(m.fr)+'</div></div>';
  r+='<div class="quiz-opts">';
  for(var i=0;i<quiz.opts.length;i++){
    var o=quiz.opts[i];var cls='quiz-opt';
    if(quiz.rep!==null){if(o.mj===m.mj)cls+=' ok';else if(o.mj===quiz.rep)cls+=' ko';}
    r+='<div class="'+cls+'" onclick="AQ('+i+')">'+esc(o.mj)+'</div>';
  }
  r+='</div></div>';
  return r;
}
function AQ(i){
  if(quiz.rep!==null)return;
  var o=quiz.opts[i],ok=o.mj===quiz.l.mots[quiz.i].mj;
  quiz.rep=o.mj;if(ok)quiz.sc++;
  draw();
  setTimeout(function(){
    var n=quiz.i+1;
    if(n>=quiz.l.mots.length){quiz.fin=true;quiz.rep=null;}
    else{quiz.i=n;quiz.rep=null;quiz.opts=genO(quiz.l.mots[n],quiz.l.mots);}
    draw();
  },2000);
}

// ── DICO ──
function allMots(){
  var a=[];
  for(var i=0;i<LECONS.length;i++){
    var l=LECONS[i];
    for(var j=0;j<l.mots.length;j++){
      if(l.mots[j].fr.indexOf('---')!==0&&l.mots[j].mj)
        a.push({fr:l.mots[j].fr,mj:l.mots[j].mj,cat:l.titre});
    }
  }
  for(var i=0;i<ESSENTIELS.length;i++)a.push({fr:ESSENTIELS[i].fr,mj:ESSENTIELS[i].mj,cat:'Essentiels'});
  return a.sort(function(a,b){return a.fr.localeCompare(b.fr,'fr');});
}
function pageD(){
  var all=allMots();
  var f=srch?all.filter(function(m){return m.fr.toLowerCase().indexOf(srch.toLowerCase())>=0||m.mj.toLowerCase().indexOf(srch.toLowerCase())>=0;}):all;
  var r='<h2 class="page-title">Dictionnaire</h2>';
  r+='<div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="si" type="search" placeholder="Chercher en français ou manjaku…"></div>';
  if(!srch)r+='<div class="dico-count">'+TM+' mots disponibles</div>';
  var shown=f.slice(0,200);
  for(var i=0;i<shown.length;i++){
    var m=shown[i];
    r+='<div class="di"><div><div class="di-fr">'+esc(m.fr)+'</div><div class="di-cat">'+esc(m.cat)+'</div></div><div class="di-mj">'+esc(m.mj)+'</div></div>';
  }
  if(f.length===0)r+='<div style="text-align:center;padding:40px;color:var(--muted)">Aucun résultat</div>';
  return r;
}
function US(v){
  srch=v;
  var ct=document.getElementById('ct');
  var all=allMots();
  var f=v?all.filter(function(m){return m.fr.toLowerCase().indexOf(v.toLowerCase())>=0||m.mj.toLowerCase().indexOf(v.toLowerCase())>=0;}):all;
  var existing=ct.querySelectorAll('.di');
  existing.forEach(function(el){el.remove();});
  var countEl=ct.querySelector('.dico-count');if(countEl)countEl.remove();
  var r='';
  var shown=f.slice(0,200);
  for(var i=0;i<shown.length;i++){
    var m=shown[i];
    r+='<div class="di"><div><div class="di-fr">'+esc(m.fr)+'</div><div class="di-cat">'+esc(m.cat)+'</div></div><div class="di-mj">'+esc(m.mj)+'</div></div>';
  }
  if(f.length===0)r='<div style="text-align:center;padding:40px;color:var(--muted)">Aucun résultat</div>';
  ct.insertAdjacentHTML('beforeend',r);
}

  r+="<p class='ap-text' style='margin-top:8px'>Napene — prêtresse divinatoire et thérapeutique — Tata Éléonore est l'aboutissement vivant de ce qu'elle transmet : une femme enracinée dans sa tradition, gardienne de la langue, de la culture et de l'âme manjaku.</p>";
  r+='</div>';
  r+='<div class="ap-section" style="animation-delay:.15s">';
  r+='<div class="ap-section-title">✦ Ses œuvres</div>';
  r+='<div class="ap-book">📖 Conversation avec mon double de lumière</div>';
  r+='<div class="ap-book">📖 Neuf mois pour renaître</div>';
  r+='<div class="ap-book">👑 Cercle "Je reprends mon trône"</div>';
  r+='</div>';
  r+='<div class="ap-section" style="animation-delay:.2s">';
  r+='<div class="ap-section-title">✦ Jukanin Manjaku</div>';
  r+="<p class='ap-text'>C'est de cette profondeur qu'est née <strong style='color:var(--gold)'>Jukanin Manjaku</strong> — apprends-moi le manjaku — aujourd'hui portée par une communauté de milliers de membres, unis par le désir de se reconnecter à leurs racines.</p>";
  r+='</div>';
  r+='<div class="ap-mission">';
  r+='<p>Se reconnecter à ses racines.</p>';
  r+='<p>Transmettre la langue à ses enfants.</p>';
  r+='<p>Préserver une identité.</p>';
  r+='</div>';
  r+='</div>';
  return r;
}


window.onload=function(){draw();};
</script>
